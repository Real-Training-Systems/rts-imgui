name: CI
on:
  push:
    branches: [ master ]
    tags:
      - "v*"
  pull_request:
    branches: [ master ]
jobs:
  Build_Windows:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore src

    - name: Build Project
      run: dotnet build -c Release --no-restore src

    - name: Build Packages
      run: dotnet pack src/ImGui.NET -c Release --no-restore --no-build

    - name: List Packages
      run: ls -l bin\Release\ImGui.NET\

    - name: Validate Generated Code
      if: false # startsWith(github.ref, 'refs/tags/')
      shell: bash
      run: |
        echo "Running CodeGenerator"
        bin/Release/CodeGenerator/net8.0/CodeGenerator.exe "src/ImGui.NET/Generated"
        git status -s | findstr . && echo "ERROR: CodeGenerator is not executed, please execute it." && exit 1 || exit 0

    - name: Add GitHub Packages source
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Real-Training-Systems/index.json"

    - name: Publish to GitHub Packages
      if: startsWith(github.ref, 'refs/tags/')
      run: dotnet nuget push bin\Release\ImGui.NET\*.nupkg --source github --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
